<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>Cryptogram Puzzle</title>
<style>
  :root{
    --bg:#0c0d10;
    --panel:rgba(255,255,255,0.06);
    --panel-border:rgba(255,255,255,0.12);
    --accent:#5ec8ff;
    --accent2:#7bffb0;
    --text:#eef2f6;
    --sub:#9aa3ad;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    height:100dvh;
    overflow:hidden;
    -webkit-user-select:none;
    user-select:none;
  }
  #app{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
    background:
      radial-gradient(circle at 20% 0%, rgba(94,200,255,0.10), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(123,255,176,0.08), transparent 50%),
      var(--bg);
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 14px 8px 14px;
    gap:8px;
  }
  .header-pill{
    display:flex; align-items:center; gap:6px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    backdrop-filter: blur(10px);
    border-radius:14px;
    padding:6px 12px;
    font-size:13px;
    font-weight:600;
    color:var(--sub);
    min-height:36px;
  }
  .header-pill b{ color:var(--text); font-size:14px; }
  .hint-btn{
    display:flex; align-items:center; gap:6px;
    background:linear-gradient(135deg, rgba(94,200,255,0.18), rgba(94,200,255,0.06));
    border:1px solid rgba(94,200,255,0.35);
    color:var(--accent);
    border-radius:14px;
    padding:8px 14px;
    font-size:14px;
    font-weight:700;
    min-height:44px;
    min-width:44px;
    cursor:pointer;
    transition: transform .12s ease, opacity .12s ease;
  }
  .hint-btn:active{ transform:scale(0.94); opacity:0.85; }

  .progress-wrap{
    flex:0 0 auto;
    padding:0 14px 6px 14px;
  }
  .progress-track{
    height:6px;
    border-radius:6px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    border-radius:6px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    transition:width .3s ease;
  }

  /* ---------- Main scroll area ---------- */
  main{
    flex:1 1 auto;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:8px 14px 14px 14px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    backdrop-filter: blur(14px);
    border-radius:18px;
    padding:16px;
    margin-bottom:14px;
  }
  .card-title{
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--sub);
    margin:0 0 10px 0;
    font-weight:700;
  }

  /* Cryptogram letter grid */
  #cryptogramGrid{
    display:flex;
    flex-wrap:wrap;
    gap:6px 4px;
    line-height:1.5;
    overflow-x:hidden;
    max-width:100%;
  }
  .word-block{
    display:flex;
    flex-wrap:wrap;
    max-width:100%;
    gap:4px;
    margin-right:14px;
    margin-bottom:6px;
  }
  .letter-cell{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:34px;
  }
  /* The cipher number, shown with a small exponent-style count badge
     at its top-right (e.g. "7" with a tiny floating "5") */
  .cipher-char{
    position:relative;
    font-size:10px;
    font-weight:700;
    color:var(--accent);
    height:14px;
    margin-top:2px;
    display:flex; align-items:center; justify-content:center;
    font-variant-numeric: tabular-nums;
    order:2; /* render below the answer box */
  }
  .cipher-count{
    position:absolute;
    top:-3px;
    right:-9px;
    font-size:9px;
    line-height:1;
    color:var(--accent2);
    font-weight:800;
  }
  .answer-box{
    order:1;
    width:30px;
    height:34px;
    border-bottom:2px solid rgba(255,255,255,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:17px;
    font-weight:700;
    color:var(--text);
    border-radius:4px;
    transition: border-color .15s ease, background .15s ease;
  }
  .answer-box.filled{
    border-color: var(--accent);
    background: rgba(94,200,255,0.08);
  }
  .answer-box.revealed{
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(123,255,176,0.08);
  }
  .answer-box.selected{
    border-color: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.25) inset;
  }
  .punct-cell .cipher-char{ color:var(--sub); }
  .punct-cell .answer-box{ border-bottom-color:transparent; color:var(--sub); }

  /* Keyboard for letter substitution */
  /* Big display above the keyboard showing the currently selected cipher
     number with a small exponent-style count badge, e.g. "3" with a tiny
     floating "7" at its top-right meaning it appears 7 times */
  .selected-number-display{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    min-height:40px;
    margin-bottom:10px;
    font-size:13px;
    color:var(--sub);
    font-weight:600;
  }
  .selected-number-display .big-num{
    position:relative;
    font-size:30px;
    font-weight:800;
    color:var(--accent);
  }
  .selected-number-display .big-num .num-count{
    position:absolute;
    top:-2px;
    right:-14px;
    font-size:13px;
    font-weight:800;
    color:var(--accent2);
  }
  .selected-number-display.solved .big-num{ color:var(--accent2); }

  #keyboard{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:center;
  }
  .kb-row{
    display:flex;
    gap:4px;
    justify-content:center;
  }
  .key{
    position:relative;
    flex:0 0 auto;
    width:28px;
    height:40px;
    border-radius:8px;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--panel-border);
    color:var(--text);
    font-size:14px;
    font-weight:700;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: transform .1s ease, background .15s ease;
  }
  .key:active{ transform:scale(0.9); }
  /* Fully solved (revealed or correctly matched) -> key turns "off":
     dimmed, locked, no longer interactive */
  .key.solved-key{
    opacity:0.32;
    background:rgba(123,255,176,0.06);
    border-color:rgba(123,255,176,0.25);
    color:var(--accent2);
    cursor:default;
    pointer-events:none;
  }
  /* Small exponent-style count badge on each key, e.g. "A" with a tiny
     floating "1" or "B" with a tiny floating "7" at the top-right.
     Only rendered once that letter's cipher number is solved. */
  .key-count{
    position:absolute;
    top:1px;
    right:3px;
    font-size:9px;
    line-height:1;
    color:var(--accent2);
    font-weight:800;
  }
  /* Letters that never appear in the current sentence stay fully active
     (only fully-solved letters should ever look "off") */

  /* Brief red flash shown on an answer box when a wrong letter was tried;
     it auto-clears shortly after since wrong guesses are never stored */
  .answer-box.wrong{
    border-color: var(--danger);
    background: rgba(255,107,107,0.12);
    color: var(--danger);
    animation: shake 0.3s ease;
  }
  @keyframes shake{
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .feedback{
    margin-top:10px;
    font-size:13px;
    font-weight:600;
    min-height:18px;
  }
  .feedback.wrong{ color:var(--danger); }
  .feedback.ok{ color:var(--accent2); }

  /* ---------- Footer ---------- */
  footer{
    flex:0 0 auto;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom)) 14px;
    display:flex;
    gap:10px;
  }
  .btn{
    flex:1;
    min-height:50px;
    border-radius:14px;
    font-size:16px;
    font-weight:800;
    border:none;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    gap:6px;
    transition: transform .12s ease, opacity .12s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-next{
    background:linear-gradient(135deg, var(--accent2), #36d68f);
    color:#04140c;
    display:none;
  }

  /* Clear overlay animation */
  #clearOverlay{
    position:fixed;
    inset:0;
    background:rgba(5,6,8,0.78);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  #clearOverlay.show{ opacity:1; pointer-events:auto; }
  .clear-card{
    background:linear-gradient(160deg, rgba(94,200,255,0.16), rgba(123,255,176,0.08));
    border:1px solid rgba(255,255,255,0.18);
    border-radius:22px;
    padding:30px 26px;
    text-align:center;
    width:80%;
    max-width:300px;
    transform:scale(0.7);
    opacity:0;
    transition: transform .35s cubic-bezier(.2,1.4,.4,1), opacity .35s ease;
  }
  #clearOverlay.show .clear-card{
    transform:scale(1);
    opacity:1;
  }
  .clear-card h2{
    margin:0 0 6px 0;
    font-size:24px;
    color:var(--accent2);
  }
  .clear-card p{
    margin:0 0 18px 0;
    color:var(--sub);
    font-size:13px;
  }
  .clear-card button{
    width:100%;
    min-height:48px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg, var(--accent2), #36d68f);
    color:#04140c;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
  }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>
<body>

<div id="app">

  <!-- ===== Header ===== -->
  <header>
    <div class="header-pill">LEVEL <b id="levelLabel">1</b></div>
    <div class="header-pill" id="progressLabel">0 / 0 letters</div>
    <button class="hint-btn" id="hintBtn">💡 Hint</button>
  </header>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- ===== Main (single screen: puzzle + keyboard) ===== -->
  <main>

    <div class="card">
      <p class="card-title">Cryptogram</p>
      <div id="cryptogramGrid"></div>
    </div>

    <div class="card">
      <div id="selectedNumberDisplay" class="selected-number-display">Tap a number in the puzzle</div>
      <div id="keyboard"></div>
      <div class="feedback" id="mapFeedback"></div>
    </div>

  </main>

  <!-- ===== Footer ===== -->
  <footer>
    <button class="btn btn-next" id="nextBtn">Next Level →</button>
  </footer>

</div>

<!-- ===== Clear celebration overlay ===== -->
<div id="clearOverlay">
  <div class="clear-card">
    <h2>🎉 Solved!</h2>
    <p id="clearSub">Great job decoding the message.</p>
    <button id="clearNextBtn">Continue to Next Level</button>
  </div>
</div>

<script>
/* =========================================================
   CRYPTOGRAM PUZZLE GAME
   Single-screen vanilla JS implementation.
   - Cipher: each plain letter A-Z maps to a fixed random NUMBER (1-26).
   - Each cipher number shows a tiny exponent-style count badge
     (e.g. "7" with a small floating "5") indicating how many times
     it appears, which disappears once that number is solved.
   - Answer is auto-checked the moment every letter is filled in,
     no manual "Check" button needed.
   ========================================================= */

/* ---------- 1. Sentence bank (50+ quotes, length scaled by level) ---------- */
const SENTENCES = [
  "The only way to do great work is to love what you do.",
  "Life is what happens when you are busy making other plans.",
  "In the middle of difficulty lies opportunity.",
  "The future belongs to those who believe in the beauty of their dreams.",
  "Success is not final, failure is not fatal, it is the courage to continue that counts.",
  "Happiness is not something ready made, it comes from your own actions.",
  "The mind is everything, what you think you become.",
  "Whatever you are, be a good one.",
  "Do not go where the path may lead, go instead where there is no path.",
  "The journey of a thousand miles begins with a single step.",
  "Be yourself, everyone else is already taken.",
  "Turn your wounds into wisdom.",
  "It does not matter how slowly you go as long as you do not stop.",
  "Everything you can imagine is real.",
  "The best way to predict the future is to create it.",
  "What lies behind us and before us are small matters compared to what lies within us.",
  "You miss one hundred percent of the shots you never take.",
  "I have not failed, I have just found ten thousand ways that will not work.",
  "Believe you can and you are halfway there.",
  "Act as if what you do makes a difference, because it does.",
  "Knowing yourself is the beginning of all wisdom.",
  "Patience is bitter, but its fruit is sweet.",
  "He who has a why to live for can bear almost any how.",
  "The unexamined life is not worth living.",
  "What does not kill you makes you stronger.",
  "Out of difficulties grow miracles.",
  "Courage is not the absence of fear, but the triumph over it.",
  "We become what we think about most of the time.",
  "The only limit to our realization of tomorrow is our doubts of today.",
  "Hardships often prepare ordinary people for an extraordinary destiny.",
  "Strive not to be a success, but rather to be of value.",
  "Try not to become a man of success, but a man of value.",
  "If you want to lift yourself up, lift up someone else.",
  "I attribute my success to this, I never gave or took any excuse.",
  "You take your life in your own hands, and what happens, a terrible responsibility.",
  "I can not change the direction of the wind, but I can adjust my sails to always reach my destination.",
  "Nothing is impossible, the word itself says I am possible.",
  "There is no charm equal to tenderness of heart.",
  "Spread love everywhere you go, let no one ever come to you without leaving happier.",
  "Keep your face always toward the sunshine, and shadows will fall behind you.",
  "When you reach the end of your rope, tie a knot in it and hang on.",
  "Always remember that you are absolutely unique, just like everyone else.",
  "Don't judge each day by the harvest you reap but by the seeds that you plant.",
  "The future depends on what you do today.",
  "Tell me and I forget, teach me and I may remember, involve me and I learn.",
  "The best and most beautiful things in the world cannot be seen or touched.",
  "It is during our darkest moments that we must focus to see the light.",
  "Do not let yesterday take up too much of today.",
  "You learn more from failure than from success, do not let it stop you.",
  "If you are working on something exciting that you really care about, you do not have to be pushed.",
  "Failure will never overtake me if my determination to succeed is strong enough.",
  "Many of life's failures are people who did not realize how close they were to success when they gave up.",
  "Twenty years from now you will be more disappointed by the things you did not do.",
  "Do what you can with all you have wherever you happen to be.",
  "Either you run the day or the day runs you.",
  "Dream big and dare to fail, the world belongs to those who try.",
  "Quality is not an act, it is a habit you build over time and patience.",
  "Simplicity is the ultimate sophistication in design and in life.",
  "Stay hungry, stay foolish, and never stop learning new things each day."
];

/* ---------- 2. Difficulty mapping: level -> [minLen, maxLen] ---------- */
function lengthRangeForLevel(level){
  const minLen = 30 + (level - 1) * (70 - 30) / 9;   // 30 -> 70
  const maxLen = 40 + (level - 1) * (80 - 40) / 9;   // 40 -> 80
  return [Math.round(minLen), Math.min(100, Math.round(maxLen))];
}

function pickSentenceForLevel(level){
  const [minLen, maxLen] = lengthRangeForLevel(level);
  let candidates = SENTENCES.filter(s => s.length >= minLen && s.length <= maxLen);
  let widen = 5;
  while(candidates.length === 0 && widen < 50){
    candidates = SENTENCES.filter(s => s.length >= minLen - widen && s.length <= maxLen + widen);
    widen += 5;
  }
  if(candidates.length === 0) candidates = SENTENCES;
  const idx = Math.floor(Math.random() * candidates.length);
  return candidates[idx];
}

/* ---------- 3. Cipher generation: fixed random NUMBER substitution A-Z -> 1..26 ---------- */
function generateCipherMap(){
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const numbers = letters.map((_, i) => String(i + 1));
  for(let i = numbers.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }
  const map = {};
  letters.forEach((l, i) => map[l] = numbers[i]);
  return map;
}

/* ---------- 4. Game State ---------- */
const STORAGE_KEY = "cryptogram_save_v4";

// Transient (non-persisted) state for the brief "wrong guess" flash animation
let transientWrongCellId = null;
let transientWrongLetter = null;
let wrongFlashTimer = null;

let state = {
  level: 1,
  sentence: "",
  cipherMap: {},
  userMap: {},
  revealedCipherLetters: [],
  selectedCipherLetter: null,
  selectedCellId: null
};

function reverseMap(cipherMap){
  const rev = {};
  Object.keys(cipherMap).forEach(plain => { rev[cipherMap[plain]] = plain; });
  return rev;
}

/* ---------- 5. Persistence ---------- */
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const parsed = JSON.parse(raw);
    if(parsed && parsed.sentence && parsed.cipherMap){
      state = Object.assign(state, parsed);
      return true;
    }
  }catch(e){}
  return false;
}

/* ---------- 6. Puzzle creation ---------- */
function startNewPuzzle(level){
  const sentence = pickSentenceForLevel(level).toUpperCase();
  const cipherMap = generateCipherMap();
  state.level = level;
  state.sentence = sentence;
  state.cipherMap = cipherMap;
  state.userMap = {};
  state.revealedCipherLetters = [];
  state.selectedCipherLetter = null;
  state.selectedCellId = null;

  autoRevealStarterLetters(2); // give the player a small head start, on every level

  saveState();
  renderAll();
}

/* Reveal N random unique cipher numbers automatically at puzzle start */
function autoRevealStarterLetters(count){
  const uniqueNumbers = [...new Set(state.sentence.split("").filter(c => /[A-Z]/.test(c)).map(c => state.cipherMap[c]))];
  const rev = reverseMap(state.cipherMap);
  const shuffled = uniqueNumbers.slice().sort(() => Math.random() - 0.5);
  const toReveal = shuffled.slice(0, Math.min(count, shuffled.length));
  toReveal.forEach(num => {
    state.revealedCipherLetters.push(num);
    state.userMap[num] = rev[num];
  });
}

/* ---------- 7. Rendering ---------- */
function renderAll(){
  document.getElementById("levelLabel").textContent = state.level;
  renderCryptogram();
  renderKeyboard();
  renderSelectedNumberDisplay();
  updateProgress();
  document.getElementById("mapFeedback").textContent = "";
  document.getElementById("nextBtn").style.display = "none";
}

/* Count total occurrences of each cipher number in the current sentence */
function getCipherCounts(){
  const counts = {};
  state.sentence.split("").filter(c => /[A-Z]/.test(c)).forEach(ch => {
    const num = state.cipherMap[ch];
    counts[num] = (counts[num] || 0) + 1;
  });
  return counts;
}

function renderCryptogram(){
  const grid = document.getElementById("cryptogramGrid");
  grid.innerHTML = "";
  const words = state.sentence.split(" ");
  const rev = reverseMap(state.cipherMap);
  const counts = getCipherCounts();

  words.forEach((word, wordIdx) => {
    const wordBlock = document.createElement("div");
    wordBlock.className = "word-block";

    word.split("").forEach((ch, charIdx) => {
      const cellId = `${wordIdx}-${charIdx}`;
      const cell = document.createElement("div");
      const isLetter = /[A-Z]/.test(ch);
      cell.className = "letter-cell" + (isLetter ? "" : " punct-cell");

      const cipherSpan = document.createElement("div");
      cipherSpan.className = "cipher-char";

      const answerBox = document.createElement("div");
      answerBox.className = "answer-box";

      if(isLetter){
        const cipherNum = state.cipherMap[ch];
        const correctPlain = rev[cipherNum];
        const revealed = state.revealedCipherLetters.includes(cipherNum);
        const guessed = state.userMap[cipherNum];
        const isSolved = revealed || guessed === correctPlain;

        // Cipher number text only (no count badge here)
        cipherSpan.appendChild(document.createTextNode(cipherNum));

        if(revealed){
          answerBox.textContent = ch;
          answerBox.classList.add("revealed");
        } else if(guessed){
          answerBox.textContent = guessed;
          answerBox.classList.add("filled");
        } else if(transientWrongCellId === cellId){
          // Briefly show the wrong letter in red before it clears
          answerBox.textContent = transientWrongLetter;
          answerBox.classList.add("wrong");
        } else {
          answerBox.textContent = "";
        }

        // Only the single tapped cell shows the "selected" highlight,
        // even if other cells share the same cipher number.
        if(state.selectedCellId === cellId){
          answerBox.classList.add("selected");
        }

        cell.addEventListener("click", () => {
          if(revealed) return; // locked, already solved
          state.selectedCipherLetter = cipherNum; // which cipher number to fill
          state.selectedCellId = cellId;            // which single cell looks selected
          renderCryptogram();
          renderKeyboard();
          renderSelectedNumberDisplay();
        });
      } else {
        cipherSpan.appendChild(document.createTextNode(ch));
        answerBox.textContent = ch === " " ? "" : ch;
      }

      cell.appendChild(answerBox);
      cell.appendChild(cipherSpan);
      wordBlock.appendChild(cell);
    });

    grid.appendChild(wordBlock);
  });
}

/* Render the "selected cipher number" display above the keyboard, showing
   the number with a small exponent-style count badge (e.g. 3 with a tiny 7) */
function renderSelectedNumberDisplay(){
  const el = document.getElementById("selectedNumberDisplay");
  const num = state.selectedCipherLetter;

  if(!num){
    el.classList.remove("solved");
    el.innerHTML = "Tap a number in the puzzle";
    return;
  }

  const rev = reverseMap(state.cipherMap);
  const counts = getCipherCounts();
  const correctPlain = rev[num];
  const isSolved = state.revealedCipherLetters.includes(num) || state.userMap[num] === correctPlain;

  el.classList.toggle("solved", isSolved);
  el.innerHTML = `
    <span>Selected:</span>
    <span class="big-num">${num}${isSolved ? "" : `<span class="num-count">${counts[num]}</span>`}</span>
    <span>${isSolved ? "✓ solved" : "appears " + counts[num] + "x"}</span>
  `;
}

function renderKeyboard(){
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  // QWERTY layout instead of alphabetical, rendered as 3 rows
  const rows = [
    "QWERTYUIOP".split(""),
    "ASDFGHJKL".split(""),
    "ZXCVBNM".split("")
  ];

  const rev = reverseMap(state.cipherMap);

  // Count how many times each plain letter appears in the original sentence
  const letterCounts = {};
  state.sentence.split("").filter(c => /[A-Z]/.test(c)).forEach(ch => {
    letterCounts[ch] = (letterCounts[ch] || 0) + 1;
  });

  rows.forEach(rowLetters => {
    const rowEl = document.createElement("div");
    rowEl.className = "kb-row";

    rowLetters.forEach(letter => {
      const count = letterCounts[letter] || 0;
      const cipherNum = state.cipherMap[letter];
      // "Solved" = this letter's cipher number has been hint-revealed,
      // or the player has correctly assigned this exact letter to it.
      // Letters that simply don't appear in the sentence stay fully active —
      // only a FULLY SOLVED letter should ever look turned off.
      const isSolved = count > 0 && (state.revealedCipherLetters.includes(cipherNum) || state.userMap[cipherNum] === letter);

      const key = document.createElement("div");
      key.className = "key" + (isSolved ? " solved-key" : "");

      // Only show the tiny count badge once the letter is solved (revealed or matched)
      key.innerHTML = `${letter}${isSolved ? `<span class="key-count">${count}</span>` : ""}`;

      key.addEventListener("click", () => {
        if(isSolved) return; // already fully solved, key is locked off
        if(!state.selectedCipherLetter) return;
        if(state.revealedCipherLetters.includes(state.selectedCipherLetter)) return; // locked

        const correctPlain = rev[state.selectedCipherLetter];

        if(letter === correctPlain){
          // Correct guess: store it, it becomes solved immediately
          state.userMap[state.selectedCipherLetter] = letter;
          saveState();
          renderCryptogram();
          renderKeyboard();
          renderSelectedNumberDisplay();
          updateProgress();
          autoCheckAnswer(); // check immediately after every keystroke, no manual button
        } else {
          // Wrong guess: flash red on the selected cell, then clear it back
          // to empty. Wrong guesses are never stored in userMap.
          transientWrongCellId = state.selectedCellId;
          transientWrongLetter = letter;
          renderCryptogram();
          clearTimeout(wrongFlashTimer);
          wrongFlashTimer = setTimeout(() => {
            transientWrongCellId = null;
            transientWrongLetter = null;
            renderCryptogram();
          }, 380);
        }
      });
      rowEl.appendChild(key);
    });

    kb.appendChild(rowEl);
  });
}

/* ---------- 8. Progress bar (based on unique cipher numbers solved) ---------- */
function updateProgress(){
  const rev = reverseMap(state.cipherMap);
  const uniqueCipherNumbers = [...new Set(state.sentence.split("").filter(c => /[A-Z]/.test(c)).map(c => state.cipherMap[c]))];
  const solvedCount = uniqueCipherNumbers.filter(num =>
    state.revealedCipherLetters.includes(num) || state.userMap[num] === rev[num]
  ).length;
  const total = uniqueCipherNumbers.length;
  const pct = total === 0 ? 0 : Math.round((solvedCount / total) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${solvedCount} / ${total} letters`;
}

/* ---------- 9. Hint system ---------- */
document.getElementById("hintBtn").addEventListener("click", () => {
  const uniqueCipherNumbers = [...new Set(state.sentence.split("").filter(c => /[A-Z]/.test(c)).map(c => state.cipherMap[c]))];
  const remaining = uniqueCipherNumbers.filter(c => !state.revealedCipherLetters.includes(c));
  if(remaining.length === 0) return;

  const pick = remaining[Math.floor(Math.random() * remaining.length)];
  state.revealedCipherLetters.push(pick);
  const plain = reverseMap(state.cipherMap)[pick];
  state.userMap[pick] = plain;

  saveState();
  renderCryptogram();
  renderKeyboard();
  renderSelectedNumberDisplay();
  updateProgress();
  autoCheckAnswer();
});

/* ---------- 10. Auto answer checking (no manual check button) ---------- */
function buildUserDecodedSentence(){
  return state.sentence.split("").map(ch => {
    if(!/[A-Z]/.test(ch)) return ch;
    const cipherNum = state.cipherMap[ch];
    return state.userMap[cipherNum] || "_";
  }).join("");
}

function autoCheckAnswer(){
  const decoded = buildUserDecodedSentence();
  if(decoded === state.sentence){
    onPuzzleSolved();
  }
}

/* ---------- 11. Puzzle solved -> celebration + next level ---------- */
function onPuzzleSolved(){
  const feedback = document.getElementById("mapFeedback");
  feedback.textContent = "✅ Correct! Puzzle solved.";
  feedback.className = "feedback ok";

  document.getElementById("nextBtn").style.display = "flex";

  const overlay = document.getElementById("clearOverlay");
  document.getElementById("clearSub").textContent = `Level ${state.level} complete!`;
  overlay.classList.add("show");
}

function goToNextLevel(){
  document.getElementById("clearOverlay").classList.remove("show");
  const nextLevel = Math.min(10, state.level + 1);
  startNewPuzzle(nextLevel);
}

document.getElementById("nextBtn").addEventListener("click", goToNextLevel);
document.getElementById("clearNextBtn").addEventListener("click", goToNextLevel);

/* ---------- 12. Init ---------- */
function init(){
  const restored = loadState();
  if(!restored){
    startNewPuzzle(1);
  } else {
    renderAll();
  }
}

init();
</script>
</body>
